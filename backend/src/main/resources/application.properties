spring.application.name=gestion-notes
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_notes_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
gestionnotes.app.jwtSecret=${JWT_SECRET:=======================GestionNotesSecretKeyByAntigravity======================}
gestionnotes.app.jwtExpirationMs=86400000

# Groq API Configuration
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY:NO_KEY_PROVIDED}
